<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>douhavecancer.xyz — Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red:    #ff2020;
      --yellow: #ffe800;
      --green:  #00ff88;
      --dark:   #0a0a0a;
      --mid:    #111111;
      --card:   #0e0e0e;
      --border: #2a2a2a;
      --border2:#3a3a3a;
      --text:   #e8e8e8;
      --dim:    #888;
      --dimmer: #555;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* SCANLINE OVERLAY */
    body::after {
      content:''; position:fixed; inset:0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);
      pointer-events:none; z-index:9999;
    }

    /* ── HEADER ── */
    header {
      background: #0d0d0d;
      border-bottom: 3px solid var(--red);
      padding: 20px 36px 16px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(24px, 4vw, 44px);
      letter-spacing: 4px;
      color: var(--red);
      text-shadow: 0 0 30px rgba(255,32,32,0.5), 0 0 60px rgba(255,32,32,0.2);
    }
    header .tagline { font-size: 10px; color: #3a3a3a; letter-spacing: 2px; text-transform: uppercase; }
    header .refresh  { margin-left: auto; font-size: 9px; color: var(--dimmer); letter-spacing: 1px; display:flex; align-items:center; gap:6px; }
    .live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 1.4s ease-in-out infinite; flex-shrink:0; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

    /* ── TICKER ── */
    .ticker-bar {
      background: var(--red);
      padding: 7px 0;
      overflow: hidden;
      white-space: nowrap;
      border-bottom: 1px solid #cc0000;
    }
    .ticker-inner {
      display: inline-block;
      animation: ticker 60s linear infinite;
      font-size: 11px;
      letter-spacing: 2px;
      font-weight: 700;
      color: #000;
      font-family: 'Space Mono', monospace;
    }
    @keyframes ticker {
      0%   { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }

    /* ── ADD SECTION ── */
    .add-section {
      background: #0d0d0d;
      border-bottom: 1px solid var(--border);
      padding: 22px 36px;
    }
    .add-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); margin-bottom: 12px; }
    .add-row   { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; max-width: 1000px; }
    @media(max-width:700px){ .add-row{ grid-template-columns:1fr; } }

    .add-input {
      background: #111; border: 1px solid var(--border2);
      color: var(--text); font-family: 'Space Mono', monospace;
      font-size: 12px; padding: 11px 13px; outline: none;
      letter-spacing: .5px; transition: border-color .15s;
    }
    .add-input::placeholder { color: #2e2e2e; }
    .add-input:focus { border-color: var(--red); box-shadow: 0 0 8px rgba(255,32,32,0.15); }

    .add-btn {
      background: var(--red); color: #000; border: none;
      padding: 11px 24px; font-family: 'Bebas Neue', cursive;
      font-size: 20px; letter-spacing: 2px; cursor: pointer;
      transition: all .15s; white-space: nowrap;
      text-shadow: none;
    }
    .add-btn:hover    { background: #ff4040; box-shadow: 0 0 16px rgba(255,32,32,0.4); }
    .add-btn:disabled { background: #333; color: #555; cursor: wait; box-shadow: none; }
    .add-status       { font-size: 10px; color: var(--dim); margin-top: 8px; letter-spacing: 1px; min-height: 16px; }
    .add-status.err   { color: var(--red); }

    /* ── LEADERBOARD ── */
    .lb-section { padding: 28px 36px 80px; }
    .lb-header  { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .lb-title   { font-family: 'Bebas Neue', cursive; font-size: 22px; letter-spacing: 3px; color: var(--dim); }
    .lb-count   { font-size: 9px; color: var(--dim); letter-spacing: 2px; border: 1px solid var(--border2); padding: 3px 10px; }

    /* column headers */
    .lb-cols {
      display: grid;
      grid-template-columns: 40px 1fr 130px 180px 160px 110px 36px 36px;
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
      gap: 0;
    }
    .lb-col { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }

    /* ── POSITION ROW ── */
    .pos {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      margin-bottom: 3px;
      transition: border-color .15s, border-left-color .15s;
    }
    .pos:hover      { border-color: var(--border2); }
    .pos.expanded   { border-left-color: var(--red); border-color: #2e1a1a; }
    .pos.open-pos   { border-left-color: var(--green); }
    .pos.open-pos.expanded { border-left-color: var(--red); }

    .pos-row {
      display: grid;
      grid-template-columns: 40px 1fr 130px 180px 160px 110px 36px 36px;
      padding: 14px 16px;
      cursor: pointer;
      align-items: center;
      gap: 0;
    }

    .pos-rank { font-family: 'Bebas Neue', cursive; font-size: 22px; color: var(--dim); }

    .pos-token { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .tok-img   { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; background: #1a1a1a; border: 1px solid var(--border2); flex-shrink: 0; }
    .tok-ph    { width: 30px; height: 30px; border-radius: 50%; background: #1a1a1a; border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .tok-info  { min-width: 0; }
    .tok-sym   { font-family: 'Bebas Neue', cursive; font-size: 19px; letter-spacing: 1px; color: var(--text); }
    .tok-name  { font-size: 9px; color: var(--dim); letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tok-nick  { font-size: 9px; color: var(--red); letter-spacing: 1px; margin-top: 1px; font-style: italic; }

    .pos-wallet { font-size: 10px; color: var(--dim); letter-spacing: .5px; }

    .pos-val        { font-family: 'Bebas Neue', cursive; font-size: 21px; letter-spacing: 1px; }
    .pos-val.red    { color: var(--red);    text-shadow: 0 0 10px rgba(255,32,32,0.3); }
    .pos-val.green  { color: var(--green);  text-shadow: 0 0 10px rgba(0,255,136,0.25); }
    .pos-val.yellow { color: var(--yellow); text-shadow: 0 0 10px rgba(255,232,0,0.2); }
    .pos-val.dim    { color: var(--dimmer); }
    .pos-sub        { font-size: 9px; color: var(--dim); margin-top: 2px; letter-spacing: 1px; }

    .badge-open   { display: inline-block; font-size: 9px; letter-spacing: 1px; padding: 2px 7px; font-weight: 700; background: rgba(0,255,136,.07); color: var(--green); border: 1px solid var(--green); }
    .badge-closed { display: inline-block; font-size: 9px; letter-spacing: 1px; padding: 2px 7px; font-weight: 700; background: rgba(255,32,32,.07);  color: var(--red);   border: 1px solid var(--red); }

    .chevron   { color: var(--dimmer); font-size: 14px; text-align: center; transition: transform .2s; user-select: none; }
    .pos.expanded .chevron { transform: rotate(180deg); }

    .row-del   { background: transparent; border: none; color: #2a2a2a; font-size: 14px; cursor: pointer; padding: 4px 6px; transition: color .15s; line-height: 1; }
    .row-del:hover { color: var(--red); text-shadow: 0 0 8px rgba(255,32,32,0.5); }

    /* ── EXPANDED PANEL ── */
    .pos-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 22px 16px 18px;
      background: #0b0b0b;
    }
    .pos.expanded .pos-detail { display: block; }

    /* investment badge */
    .inv-badge {
      display: inline-block; padding: 6px 16px;
      font-family: 'Bebas Neue', cursive; font-size: 16px; letter-spacing: 2px; margin-bottom: 16px;
    }
    .inv-badge.covered    { background: rgba(0,255,136,.07); color: var(--green); border: 1px solid var(--green); text-shadow: 0 0 10px rgba(0,255,136,0.3); }
    .inv-badge.underwater { background: rgba(255,32,32,.07);  color: var(--red);   border: 1px solid var(--red);   text-shadow: 0 0 10px rgba(255,32,32,0.3); }
    .inv-badge.unknown    { background: rgba(255,232,0,.07);  color: var(--yellow);border: 1px solid var(--yellow); text-shadow: 0 0 10px rgba(255,232,0,0.2); }

    /* 4 detail cards */
    .detail-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
    @media(max-width:800px){ .detail-grid{ grid-template-columns: repeat(2,1fr); } }

    .d-card  { background: var(--mid); border: 1px solid var(--border); border-top: 2px solid var(--red); padding: 14px 16px; }
    .d-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
    .d-val   { font-family: 'Bebas Neue', cursive; font-size: 24px; letter-spacing: 1px; line-height: 1; }
    .d-val.red    { color: var(--red);    text-shadow: 0 0 12px rgba(255,32,32,0.35); }
    .d-val.green  { color: var(--green);  text-shadow: 0 0 12px rgba(0,255,136,0.3); }
    .d-val.yellow { color: var(--yellow); text-shadow: 0 0 12px rgba(255,232,0,0.25); }
    .d-val.dim    { color: var(--dimmer); }
    .d-sub { font-size: 10px; color: var(--dim); margin-top: 5px; }

    /* tx table */
    .tx-wrap  { background: var(--mid); border: 1px solid var(--border); padding: 18px 16px 14px; margin-bottom: 14px; }
    .tx-title { font-family: 'Bebas Neue', cursive; font-size: 16px; letter-spacing: 3px; color: var(--dimmer); margin-bottom: 12px; }
    .tx-table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .tx-table th { text-align: left; padding: 6px 8px; font-size: 9px; letter-spacing: 2px; color: var(--dimmer); border-bottom: 1px solid var(--border); font-weight: 400; }
    .tx-table td { padding: 9px 8px; border-bottom: 1px solid #1a1a1a; color: var(--text); }
    .tx-sell  { color: var(--red); font-weight: 700; }
    .tx-buy   { color: var(--green); font-weight: 700; }
    .tx-link  { color: var(--dim); text-decoration: none; font-size: 8px; }
    .tx-link:hover { color: var(--text); }
    .tx-empty { color: var(--dim); text-align: center; padding: 14px; font-size: 11px; }

    /* footer of expanded */
    .detail-foot { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .btn-remove  { background: transparent; color: var(--dimmer); border: 1px solid var(--border2); padding: 8px 16px; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; cursor: pointer; transition: all .15s; }
    .btn-remove:hover { border-color: var(--red); color: var(--red); box-shadow: 0 0 8px rgba(255,32,32,0.2); }
    .btn-report  { background: transparent; color: var(--green); border: 1px solid var(--green); padding: 8px 16px; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; cursor: pointer; transition: all .15s; text-decoration: none; display: inline-block; }
    .btn-report:hover { background: rgba(0,255,136,.07); box-shadow: 0 0 10px rgba(0,255,136,0.2); }
    .last-upd { font-size: 9px; color: var(--dim); letter-spacing: 1px; margin-left: auto; }

    /* ── EMPTY / LOADING ── */
    .pos-loading { padding: 18px; font-size: 10px; color: var(--dimmer); letter-spacing: 1px; text-align: center; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--dimmer); }
    .empty-icon  { font-size: 40px; margin-bottom: 14px; opacity: .4; }
    .empty-title { font-family: 'Bebas Neue', cursive; font-size: 22px; letter-spacing: 3px; color: var(--dimmer); margin-bottom: 8px; }
    .empty-sub   { font-size: 10px; letter-spacing: 1px; }

    @media(max-width:900px){
      .lb-cols, .pos-row { grid-template-columns: 36px 1fr 110px 36px 36px; }
      .lb-cols .lb-col:nth-child(3),
      .lb-cols .lb-col:nth-child(4),
      .lb-cols .lb-col:nth-child(5),
      .pos-row > *:nth-child(3),
      .pos-row > *:nth-child(4),
      .pos-row > *:nth-child(5) { display: none; }
      .detail-grid { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <h1>douhavecancer.xyz</h1>
  <span class="tagline">financial damage tracker</span>
  <div class="refresh">
    <span class="live-dot"></span>
    <span id="nextRefresh">refreshes in 60s</span>
  </div>
</header>

<!-- TICKER -->
<div class="ticker-bar">
  <span class="ticker-inner" id="tickerInner">🩺 LOADING POSITIONS... CALCULATING DAMAGE... PROGNOSIS: VERY BAD &nbsp;&nbsp;&nbsp;&nbsp;</span>
</div>

<!-- ADD POSITION -->
<div class="add-section">
  <div class="add-label">+ Add Position</div>
  <div class="add-row">
    <input class="add-input" id="walletInput"   type="text" placeholder="Wallet Address"/>
    <input class="add-input" id="caInput"       type="text" placeholder="Contract Address (CA)"/>
    <input class="add-input" id="nicknameInput" type="text" placeholder="Nickname (e.g. Dave)"/>
    <button class="add-btn" id="addBtn" onclick="addPosition()">ADD</button>
  </div>
  <div class="add-status" id="addStatus"></div>
</div>

<!-- LEADERBOARD -->
<div class="lb-section">
  <div class="lb-header">
    <div class="lb-title">Positions</div>
    <div class="lb-count" id="posCount">0 entries</div>
  </div>
  <div class="lb-cols">
    <div class="lb-col">#</div>
    <div class="lb-col">Token</div>
    <div class="lb-col">Wallet</div>
    <div class="lb-col">Unrealised / Left</div>
    <div class="lb-col">Realised P&amp;L</div>
    <div class="lb-col">Return %</div>
    <div></div>
    <div></div>
  </div>
  <div id="leaderboard">
    <div class="empty-state">
      <div class="empty-icon">🩺</div>
      <div class="empty-title">No Positions Yet</div>
      <div class="empty-sub">Enter a wallet and CA above to begin the diagnosis</div>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const SHYFT_KEY  = 'JPtxjEtUjwBeRe8a';
const SOL_MINT   = 'So11111111111111111111111111111111111111112';
const SHYFT_BASE = 'https://api.shyft.to/sol/v1';
const NETWORK    = 'mainnet-beta';
const USDC       = 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v';
const USDT       = 'Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB';
const STORE_KEY  = 'paperhands_v3';

// ── FORMATTERS ──────────────────────────────────────────────────────────────────
const fmt     = (n,d=2) => (n==null||isNaN(n)) ? '---' : n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtUsd  = n => { if(n==null||isNaN(n)) return '$---'; const a=Math.abs(n),s=n<0?'-':''; if(a>=1e6) return s+'$'+fmt(a/1e6,2)+'M'; if(a>=1e3) return s+'$'+fmt(a,0); return s+'$'+fmt(a,2); };
const fmtTok  = n => { if(!n) return '---'; if(n>=1e9) return fmt(n/1e9,2)+'B'; if(n>=1e6) return fmt(n/1e6,2)+'M'; if(n>=1e3) return fmt(n/1e3,1)+'K'; return fmt(n,0); };
const fmtPx   = p => { if(!p) return '$---'; if(p<0.000001) return '$'+p.toExponential(4); if(p<0.01) return '$'+p.toFixed(8); return '$'+p.toFixed(6); };
const fmtMcap = m => { if(!m) return '$---'; if(m>=1e6) return '$'+fmt(m/1e6,2)+'M'; if(m>=1e3) return '$'+fmt(m/1e3,1)+'K'; return '$'+fmt(m,0); };
const shortW  = w => w ? w.slice(0,6)+'...'+w.slice(-4) : '';
const signed  = (n,d=1) => (n>=0?'+':'')+fmt(n,d);

// ── STORAGE ──────────────────────────────────────────────────────────────────
const loadPos = () => { try { return JSON.parse(localStorage.getItem(STORE_KEY)||'[]'); } catch { return []; } };
const savePos = p => localStorage.setItem(STORE_KEY, JSON.stringify(p));

// ── STATE ──────────────────────────────────────────────────────────────────────
let positions    = loadPos();
let expandedId   = null;
let refreshSec   = 60;
let cachedSolUsd = 150;

// ── API: SOL PRICE ──────────────────────────────────────────────────────────────
async function fetchSolPrice() {
  try {
    const res  = await fetch('https://api.dexscreener.com/tokens/v1/solana/'+SOL_MINT);
    const data = await res.json();
    if (!data?.length) return cachedSolUsd;
    const best = [...data].sort((a,b)=>(b.liquidity?.usd||0)-(a.liquidity?.usd||0))[0];
    return parseFloat(best.priceUsd) || cachedSolUsd;
  } catch { return cachedSolUsd; }
}

// ── API: TOKEN PRICE ────────────────────────────────────────────────────────────
async function fetchPrice(ca) {
  const res   = await fetch('https://api.dexscreener.com/tokens/v1/solana/'+ca);
  const pairs = await res.json();
  if (!pairs?.length) return null;
  const best  = [...pairs].sort((a,b)=>(b.liquidity?.usd||0)-(a.liquidity?.usd||0))[0];
  return {
    price:       parseFloat(best.priceUsd) || 0,
    change24h:   best.priceChange?.h24     || 0,
    vol24h:      best.volume?.h24          || 0,
    mcap:        best.marketCap || best.fdv || 0,
    symbol:      best.baseToken?.symbol    || '???',
    name:        best.baseToken?.name      || '',
    image:       best.info?.imageUrl       || null,
    poolAddress: best.pairAddress          || null,
  };
}

// ── API: TOKEN BALANCE ──────────────────────────────────────────────────────────
async function fetchBalance(wallet, ca) {
  try {
    const url  = SHYFT_BASE+'/wallet/token_balance?network='+NETWORK+'&wallet='+wallet+'&token='+ca;
    const res  = await fetch(url, { headers:{'x-api-key':SHYFT_KEY} });
    const data = await res.json();
    return (data.success && data.result != null) ? (data.result.balance||0) : 0;
  } catch { return 0; }
}

// ── API: ATH ────────────────────────────────────────────────────────────────────
async function fetchATH(poolAddress) {
  try {
    if (!poolAddress) return null;
    const url  = 'https://api.geckoterminal.com/api/v2/networks/solana/pools/'+poolAddress+'/ohlcv/day?limit=1000&currency=usd';
    const res  = await fetch(url, { headers:{'Accept':'application/json;version=20230302'} });
    const data = await res.json();
    const c    = data?.data?.attributes?.ohlcv_list;
    if (!c?.length) return null;
    const ath  = Math.max(...c.map(x=>x[2]));
    return ath > 0 ? ath : null;
  } catch { return null; }
}

// ── API: TRANSACTIONS ───────────────────────────────────────────────────────────
async function fetchTransactions(wallet, ca, solUsd) {
  let allTxns = [], beforeSig = null;
  for (let page = 0; page < 5; page++) {
    let url = SHYFT_BASE+'/transaction/history?network='+NETWORK+'&account='+wallet+'&tx_num=100&enable_raw=false';
    if (beforeSig) url += '&before_tx_signature='+beforeSig;
    const res  = await fetch(url, { headers:{'x-api-key':SHYFT_KEY} });
    const data = await res.json();
    if (!data.success || !data.result?.length) break;
    allTxns   = allTxns.concat(data.result);
    beforeSig = data.result[data.result.length-1].signatures[0];
    if (data.result.length < 100) break;
  }
  const relevant = [];
  for (const tx of allTxns) {
    if (!tx.token_balance_changes?.length) continue;
    const changes = tx.token_balance_changes.filter(b=>b.mint===ca&&b.owner===wallet);
    if (!changes.length) continue;
    for (const ch of changes) {
      const delta = ch.change_amount / Math.pow(10, ch.decimals||6);
      const isBuy = delta>0, isSell = delta<0;
      if (!isBuy && !isSell) continue;
      let usd = 0;
      if (!usd&&isBuy&&tx.actions?.length) { const a=tx.actions.find(a=>a.type==='BUY_EXACT_SOL_IN'&&a.info?.spendable_sol_in); if(a) usd=(a.info.spendable_sol_in/1e9)*solUsd; }
      if (!usd&&isSell&&tx.actions?.length){ const a=tx.actions.find(a=>(a.type==='SELL_EXACT_IN'||a.type==='SELL')&&a.info?.spendable_sol_in); if(a) usd=(a.info.spendable_sol_in/1e9)*solUsd; }
      if (!usd&&tx.actions?.length){ const a=tx.actions.find(a=>a.type==='SWAP'); if(a?.info?.tokens_swapped){ const sIn=a.info.tokens_swapped.in?.token_address===SOL_MINT?a.info.tokens_swapped.in.amount:0; const sOut=a.info.tokens_swapped.out?.token_address===SOL_MINT?a.info.tokens_swapped.out.amount:0; const amt=isSell?sOut:sIn; if(amt) usd=amt*solUsd; } }
      if (!usd&&tx.actions?.length){ const a=tx.actions.find(a=>a.type==='TOKEN_TRANSFER'&&a.info?.token_address===SOL_MINT&&(isSell?a.info.receiver===wallet:a.info.sender===wallet)); if(a?.info?.amount) usd=a.info.amount*solUsd; }
      if (!usd){ const s=tx.token_balance_changes.find(b=>(b.mint===USDC||b.mint===USDT)&&b.owner===wallet); if(s) usd=Math.abs(s.change_amount/Math.pow(10,s.decimals||6)); }
      relevant.push({ sig:tx.signatures[0], time:new Date(tx.timestamp).getTime(), type:isSell?'SELL':'BUY', tokens:Math.abs(delta), usdValue:usd });
    }
  }
  return relevant.sort((a,b)=>a.time-b.time);
}

// ── COMPUTE STATS ───────────────────────────────────────────────────────────────
function computeStats(txns, priceData, balance, ath) {
  const sells = txns.filter(t=>t.type==='SELL');
  const buys  = txns.filter(t=>t.type==='BUY');
  const soldTokens    = sells.reduce((s,t)=>s+t.tokens,0);
  const soldUsd       = sells.reduce((s,t)=>s+t.usdValue,0);
  const buyCost       = buys.reduce((s,t)=>s+t.usdValue,0);
  const boughtTokens  = buys.reduce((s,t)=>s+t.tokens,0);
  const isOpen        = balance > 0;
  const holdUsd       = balance * priceData.price;
  const totalVal      = holdUsd + soldUsd;
  const leftOnTable   = Math.max(0, soldTokens*priceData.price - soldUsd);
  const pnl           = buyCost>0 ? totalVal-buyCost : null;
  const retPct        = buyCost>0 ? ((totalVal-buyCost)/buyCost)*100 : null;
  let realisedPnl = null;
  if (buyCost>0&&soldTokens>0&&boughtTokens>0) realisedPnl = soldUsd-(buyCost/boughtTokens)*soldTokens;

  // ATH message + severity for closed positions
  let athMsg=null, athSeverity='covered';
  if (!isOpen && ath&&ath>0&&sells.length) {
    const last=sells[sells.length-1];
    const exitPx=last.usdValue>0&&last.tokens>0?last.usdValue/last.tokens:priceData.price;
    const pctBelow=((ath-exitPx)/ath)*100;
    if      (pctBelow<=10)  { athMsg="Surgical. Sold within 10% of ATH.";                   athSeverity='covered'; }
    else if (pctBelow<=25)  { athMsg="Decent exit. Caught most of the move.";               athSeverity='covered'; }
    else if (pctBelow<=50)  { athMsg="Mid exit. Left a fair bit on the table.";             athSeverity='unknown'; }
    else if (pctBelow<=75)  { athMsg="Classic paper hands. Chart had plenty more in it.";   athSeverity='underwater'; }
    else                    { athMsg="Sold near the bottom. The blockchain never forgets."; athSeverity='underwater'; }
  }

  // Ticker message for this position
  let tickerMsg = null;
  const nick = ''; // filled in at render time
  if (isOpen && pnl!==null) {
    tickerMsg = pnl>=0
      ? `SITTING ON ${(pnl>=0?'+':'')+fmtUsd(Math.abs(pnl))} UNREALISED P&L`
      : `DOWN ${fmtUsd(Math.abs(pnl))} AND STILL HOLDING`;
  } else if (!isOpen && athMsg) {
    tickerMsg = athMsg.toUpperCase();
  } else if (!isOpen && leftOnTable>0) {
    tickerMsg = `LEFT ${fmtUsd(leftOnTable)} ON THE TABLE`;
  }

  return { sells, buys, txns, soldTokens, soldUsd, buyCost, boughtTokens, isOpen, holdUsd, totalVal, leftOnTable, pnl, realisedPnl, retPct, athMsg, athSeverity, balance, tickerMsg };
}

// ── FULL ANALYSE ────────────────────────────────────────────────────────────────
async function analyseOne(wallet, ca, solUsd) {
  const [priceData, txns, balance] = await Promise.all([
    fetchPrice(ca),
    fetchTransactions(wallet, ca, solUsd||cachedSolUsd),
    fetchBalance(wallet, ca),
  ]);
  if (!priceData) throw new Error('Could not fetch price — check the CA');
  const ath   = await fetchATH(priceData.poolAddress);
  const stats = computeStats(txns, priceData, balance, ath);
  return { priceData, stats, txns, balance, ath, updatedAt: Date.now() };
}

// ── TICKER ──────────────────────────────────────────────────────────────────────
function updateTicker() {
  rebuildTicker();
}

function rebuildTicker() {
  const el = document.getElementById('tickerInner');
  if (!el) return;
  if (!positions.length) {
    el.textContent = '🩺 NO POSITIONS TRACKED · ADD A WALLET ABOVE TO BEGIN THE DIAGNOSIS &nbsp;&nbsp;&nbsp;&nbsp;';
    return;
  }
  const parts = [];
  for (const p of positions) {
    if (!p.result) continue;
    const nick  = p.nickname || p.result.priceData.symbol || 'UNKNOWN';
    const stats = p.result.stats;
    if (stats.tickerMsg) parts.push(`🩺 ${nick.toUpperCase()}: ${stats.tickerMsg}`);
  }
  if (!parts.length) return;
  const full = (parts.join('  ·  ') + '  ·  ').repeat(4);
  el.textContent = full;
}

// ── RENDER ROW ──────────────────────────────────────────────────────────────────
function renderRow(p, idx) {
  const { priceData, stats, updatedAt } = p.result;
  const { isOpen, pnl, realisedPnl, retPct, leftOnTable, soldUsd, holdUsd, buyCost, totalVal, sells, buys, txns, athMsg, athSeverity } = stats;
  const isExp   = expandedId === p.id;
  const updated = new Date(updatedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const nick    = p.nickname || '';

  const imgEl = priceData.image
    ? `<img class="tok-img" src="${priceData.image}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt=""/><div class="tok-ph" style="display:none">🪙</div>`
    : `<div class="tok-ph">🪙</div>`;

  // Col 3
  const col3 = isOpen
    ? { valFmt: pnl!==null?(pnl>=0?'+':'')+fmtUsd(Math.abs(pnl)):fmtUsd(holdUsd), cls: pnl===null?'yellow':pnl>=0?'green':'red', sub: pnl!==null?'unrealised P&L':'hold value' }
    : { valFmt: fmtUsd(leftOnTable), cls: leftOnTable>0?'red':'green', sub: 'left on table' };

  const rpFmt  = realisedPnl!==null?(realisedPnl>=0?'+':'')+fmtUsd(Math.abs(realisedPnl)):(soldUsd>0?fmtUsd(soldUsd):'$---');
  const rpCls  = realisedPnl===null?'dim':realisedPnl>=0?'green':'red';
  const retFmt = retPct!==null?signed(retPct)+'%':'---%';
  const retCls = retPct===null?'dim':retPct>=0?'green':'red';

  const statusBadge = isOpen ? '<span class="badge-open">OPEN</span>' : '<span class="badge-closed">CLOSED</span>';

  // Investment badge
  let invBadge = '';
  if (isOpen) {
    if (buyCost <= 0) {
      invBadge = '<div class="inv-badge unknown">⚠ BUY COST UNKNOWN</div>';
    } else if (soldUsd >= buyCost) {
      // Has actually sold enough to recover the full buy cost
      invBadge = '<div class="inv-badge covered">✓ INITIAL INVESTMENT COVERED</div>';
    } else if (pnl >= 0) {
      // Worth more than paid but hasn't sold enough to cover cost yet
      invBadge = '<div class="inv-badge covered">📈 IN PROFIT (UNREALISED)</div>';
    } else {
      invBadge = '<div class="inv-badge underwater">✗ STILL UNDERWATER</div>';
    }
  } else if (athMsg) {
    invBadge = `<div class="inv-badge ${athSeverity}">${athMsg}</div>`;
  }

  // 4 cards
  const cards = [
    { lbl:'Current Price',  val:fmtPx(priceData.price),  cls:'green',  sub:`24h: ${signed(priceData.change24h)}% · vol: ${fmtUsd(priceData.vol24h)}` },
    { lbl:'Market Cap',     val:fmtMcap(priceData.mcap), cls:'yellow', sub:'current market cap' },
    { lbl:'Realised P&L',   val:rpFmt,                   cls:rpCls,    sub:`${sells.length} sell · ${buys.length} buy tx` },
    { lbl:'Total Return',   val:retFmt,                  cls:retCls,   sub: buyCost>0?`${fmtUsd(buyCost)} in → ${fmtUsd(totalVal)} now`:'buy cost unavailable' },
  ].map(c=>`<div class="d-card"><div class="d-label">${c.lbl}</div><div class="d-val ${c.cls}">${c.val}</div><div class="d-sub">${c.sub}</div></div>`).join('');

  // Tx rows (most recent first, max 20)
  const txRows = [...txns].reverse().slice(0,20).map(t=>{
    const ds  = new Date(t.time).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});
    const usd = t.usdValue>0?fmtUsd(t.usdValue):'~unknown';
    const cls = t.type==='SELL'?'tx-sell':'tx-buy';
    return `<tr><td>${ds}</td><td class="${cls}">⬤ ${t.type}</td><td>${fmtTok(t.tokens)}</td><td style="color:${t.type==='SELL'?'var(--red)':'var(--green)'}">${usd}</td><td><a class="tx-link" href="https://solscan.io/tx/${t.sig}" target="_blank">${t.sig.slice(0,8)}…${t.sig.slice(-6)} ↗</a></td></tr>`;
  }).join('') || '<tr><td colspan="5" class="tx-empty">No transactions found</td></tr>';

  return `<div class="pos${isExp?' expanded':''}${isOpen?' open-pos':''}" id="pos-${p.id}">
    <div class="pos-row" onclick="toggleExpand(${p.id})">
      <div class="pos-rank">${idx+1}</div>
      <div class="pos-token">${imgEl}
        <div class="tok-info">
          <div class="tok-sym">${priceData.symbol}</div>
          <div class="tok-name">${priceData.name||''}</div>
          ${nick?`<div class="tok-nick">${nick}</div>`:''}
        </div>
      </div>
      <div><div class="pos-wallet">${shortW(p.wallet)}</div>${statusBadge}</div>
      <div><div class="pos-val ${col3.cls}">${col3.valFmt}</div><div class="pos-sub">${col3.sub}</div></div>
      <div><div class="pos-val ${rpCls}">${rpFmt}</div><div class="pos-sub">realised P&L</div></div>
      <div><div class="pos-val ${retCls}">${retFmt}</div><div class="pos-sub">total return</div></div>
      <div class="chevron">▼</div>
      <button class="row-del" onclick="event.stopPropagation();removePos(${p.id})" title="Remove">✕</button>
    </div>
    <div class="pos-detail">
      ${invBadge}
      <div class="detail-grid">${cards}</div>
      <div class="tx-wrap">
        <div class="tx-title">📋 Transaction History</div>
        <table class="tx-table">
          <thead><tr><th>Date</th><th>Type</th><th>Tokens</th><th>USD Value</th><th>Tx</th></tr></thead>
          <tbody>${txRows}</tbody>
        </table>
      </div>
      <div class="detail-foot">
        <button class="btn-remove" onclick="removePos(${p.id})">✕ Remove Position</button>
        <a class="btn-report" href="report.html?wallet=${p.wallet}&ca=${p.ca}" target="_blank">↗ Full Report</a>
        <div class="last-upd">updated ${updated}</div>
      </div>
    </div>
  </div>`;
}

// ── RENDER ALL ───────────────────────────────────────────────────────────────────
function renderAll() {
  const lb = document.getElementById('leaderboard');
  document.getElementById('posCount').textContent = positions.length+' entr'+(positions.length===1?'y':'ies');
  if (!positions.length) {
    lb.innerHTML = `<div class="empty-state"><div class="empty-icon">🩺</div><div class="empty-title">No Positions Yet</div><div class="empty-sub">Enter a wallet and CA above to begin the diagnosis</div></div>`;
    return;
  }
  lb.innerHTML = positions.map((p,i) =>
    p.result ? renderRow(p,i) : `<div class="pos"><div class="pos-loading">⏳ Loading diagnosis...</div></div>`
  ).join('');
  updateTicker();
}

// ── ADD ──────────────────────────────────────────────────────────────────────────
async function addPosition() {
  const wallet   = document.getElementById('walletInput').value.trim();
  const ca       = document.getElementById('caInput').value.trim();
  const nickname = document.getElementById('nicknameInput').value.trim();
  const btn      = document.getElementById('addBtn');

  if (!wallet||!ca)                                      { setAddStatus('Please enter both a wallet and CA.',true); return; }
  if (positions.find(p=>p.wallet===wallet&&p.ca===ca))   { setAddStatus('This wallet + CA already exists.',true); return; }

  btn.disabled=true; btn.textContent='LOADING...';
  setAddStatus('Fetching SOL price...');
  cachedSolUsd = await fetchSolPrice();
  setAddStatus('Analysing position...');

  try {
    const result = await analyseOne(wallet, ca, cachedSolUsd);
    positions.push({ id:Date.now(), wallet, ca, nickname, result, addedAt:Date.now() });
    savePos(positions);
    renderAll();
    document.getElementById('walletInput').value='';
    document.getElementById('caInput').value='';
    document.getElementById('nicknameInput').value='';
    setAddStatus('✓ Added — '+(nickname||result.priceData.symbol||ca.slice(0,8)));
  } catch(e) { setAddStatus(e.message, true); }
  btn.disabled=false; btn.textContent='ADD';
}

function setAddStatus(msg,isErr=false) {
  const el=document.getElementById('addStatus');
  el.textContent=msg; el.className='add-status'+(isErr?' err':'');
}

// ── REMOVE ───────────────────────────────────────────────────────────────────────
function removePos(id) {
  positions=positions.filter(p=>p.id!==id);
  if(expandedId===id) expandedId=null;
  savePos(positions);
  renderAll();
  rebuildTicker();
}

// ── EXPAND ───────────────────────────────────────────────────────────────────────
function toggleExpand(id) {
  expandedId = expandedId===id ? null : id;
  renderAll();
}

// ── REFRESH ALL ──────────────────────────────────────────────────────────────────
async function refreshAll() {
  if (!positions.length) return;
  cachedSolUsd = await fetchSolPrice();
  const jobs = positions.map(p=>({ id:p.id, wallet:p.wallet, ca:p.ca }));
  const results = await Promise.all(jobs.map(async job => {
    try { return { id:job.id, result: await analyseOne(job.wallet, job.ca, cachedSolUsd) }; }
    catch(e) { console.warn('Refresh failed', job.ca, e.message); return { id:job.id, result:null }; }
  }));
  for (const { id, result } of results) {
    if (!result) continue;
    const pos = positions.find(p=>p.id===id);
    if (!pos) continue;
    const prevTxnCount = pos.result?.stats?.txns?.length||0;
    const prevWasOpen  = pos.result?.stats?.isOpen||false;
    const newTxnCount  = result.stats?.txns?.length||0;
    const newBalance   = result.balance||0;
    if (newTxnCount===0 && prevTxnCount>0) {
      const safeBalance = (prevWasOpen && newBalance===0) ? pos.result.balance : newBalance;
      pos.result.priceData = result.priceData;
      pos.result.updatedAt = result.updatedAt;
      pos.result.balance   = safeBalance;
      pos.result.stats     = computeStats(pos.result.stats.txns, result.priceData, safeBalance, result.ath||pos.result.ath);
    } else {
      if (prevWasOpen && newBalance===0 && newTxnCount>0) {
        result.balance = pos.result.balance;
        result.stats   = computeStats(result.stats.txns, result.priceData, pos.result.balance, result.ath||pos.result.ath);
      }
      pos.result = result;
    }
  }
  savePos(positions);
  renderAll();
}

// ── COUNTDOWN ────────────────────────────────────────────────────────────────────
function startTimer() {
  refreshSec = 60;
  setInterval(()=>{
    refreshSec--;
    const el=document.getElementById('nextRefresh');
    if(el) el.textContent='refreshes in '+refreshSec+'s';
    if(refreshSec<=0){ refreshSec=60; refreshAll(); }
  }, 1000);
}

// ── INIT ─────────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async ()=>{
  document.getElementById('walletInput').addEventListener('keydown',   e=>{ if(e.key==='Enter') document.getElementById('caInput').focus(); });
  document.getElementById('caInput').addEventListener('keydown',       e=>{ if(e.key==='Enter') document.getElementById('nicknameInput').focus(); });
  document.getElementById('nicknameInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addPosition(); });
  renderAll();
  startTimer();
  if (positions.length) await refreshAll();
});
</script>
